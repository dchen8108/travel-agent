{% extends "layout.html" %}
{% block content %}
<section class="hero compact form-hero">
  <div>
    <p class="page-context">Collection</p>
    <h2>{{ group.label if group else 'Create collection' }}</h2>
  </div>
</section>

<section class="form-card">
  {% if error_message %}
  <section class="warning-card top-gap-small">
    <strong>Group not saved.</strong>
    <p>{{ error_message }}</p>
  </section>
  {% endif %}
  <form method="post" action="/groups" novalidate>
    <input type="hidden" name="trip_group_id" value="{{ group_form_state.trip_group_id }}">
    <input type="hidden" name="cancel_url" value="{{ cancel_url }}">
    <div class="form-grid">
      <label>
        <span>Collection name</span>
        <input type="text" name="label" value="{{ group_form_state.label }}" required>
      </label>
      <label class="full-width">
        <span>Description</span>
        <textarea name="description" rows="4" placeholder="Optional context for this collection.">{{ group_form_state.description }}</textarea>
      </label>
    </div>
    <div class="actions top-gap">
      <a class="button ghost" href="{{ cancel_url }}">Cancel</a>
      <button type="submit" class="button primary">Save collection</button>
    </div>
  </form>
</section>
{% endblock %}
