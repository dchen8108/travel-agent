<section class="form-section">
  <div class="section-header compact">
    <div>
      <h3>Flight</h3>
    </div>
  </div>
  <div class="form-grid booking-itinerary-grid">
    <div class="field" data-single-picker-field data-picker-type="airline">
      <span>Airline</span>
      <input type="hidden" name="airline" value="{{ booking_form_state.airline }}">
      <div data-picker-root></div>
    </div>
    <div class="field" data-single-picker-field data-picker-type="airport">
      <span>Origin airport</span>
      <input type="hidden" name="origin_airport" value="{{ booking_form_state.origin_airport }}">
      <div data-picker-root></div>
    </div>
    <div class="field" data-single-picker-field data-picker-type="airport">
      <span>Destination airport</span>
      <input type="hidden" name="destination_airport" value="{{ booking_form_state.destination_airport }}">
      <div data-picker-root></div>
    </div>
    <label>
      <span>Departure date</span>
      <input type="date" name="departure_date" value="{{ booking_form_state.departure_date }}" required>
    </label>
    <label>
      <span>Departure time</span>
      <input type="time" name="departure_time" value="{{ booking_form_state.departure_time }}" required>
    </label>
    <label>
      <span>Arrival time</span>
      <input type="time" name="arrival_time" value="{{ booking_form_state.arrival_time }}">
    </label>
  </div>
</section>

<section class="form-section">
  <div class="section-header compact">
    <div>
      <h3>Price</h3>
    </div>
  </div>
  <div class="form-grid">
    <label>
      <span>Booked price</span>
      <input type="number" name="booked_price" min="0" step="0.01" value="{{ booking_form_state.booked_price }}" required>
    </label>
    <label>
      <span>Record locator</span>
      <input type="text" name="record_locator" value="{{ booking_form_state.record_locator }}">
    </label>
    <label class="full-width">
      <span>Notes</span>
      <textarea name="notes" rows="3">{{ booking_form_state.notes }}</textarea>
    </label>
  </div>
</section>
