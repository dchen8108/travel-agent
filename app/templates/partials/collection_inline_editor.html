{% from "partials/icon_macros.html" import icon %}
<form method="post" action="/groups" class="collection-card-head collection-inline-form">
  <input type="hidden" name="trip_group_id" value="{{ collection_editor_state.trip_group_id }}">
  <input type="hidden" name="cancel_url" value="{{ collection_editor_state.cancel_url }}">
  <div class="collection-card-copy">
    <div class="collection-card-titleline collection-card-titleline--editing">
      <label class="sr-only" for="collection-label-{{ collection_editor_state.trip_group_id or 'new' }}">Collection name</label>
      <input
        id="collection-label-{{ collection_editor_state.trip_group_id or 'new' }}"
        class="collection-inline-input"
        type="text"
        name="label"
        value="{{ collection_editor_state.label }}"
        placeholder="Collection name"
        required
        autofocus
      >
      <div class="timeline-title-actions" aria-label="Collection actions">
        <button class="timeline-icon-control" type="submit" title="Save collection" aria-label="Save collection">
          {{ icon("check") }}
        </button>
        <a class="timeline-icon-control" href="{{ collection_editor_state.cancel_url }}" title="Cancel editing" aria-label="Cancel editing">
          {{ icon("close") }}
        </a>
      </div>
    </div>
    {% if collection_editor_state.error_message %}
    <p class="collection-inline-error">{{ collection_editor_state.error_message }}</p>
    {% endif %}
  </div>
  {% if collection_editor_state.mode == "edit" %}
  <div class="collection-card-actions">
    <a class="button primary compact" href="/trips/new?trip_group_id={{ collection_editor_state.trip_group_id }}">Create trip</a>
  </div>
  {% endif %}
</form>
