<div class="dashboard-ledger-section" data-scheduled-panel>
  <section class="card filter-card">
    <form method="get" action="{{ scheduled_filter_action_path or '/' }}" class="filter-toolbar" data-scheduled-filter-form>
      <noscript>
        <style>
          .filter-picker-shell,
          .filter-toggle {
            display: none !important;
          }

          .filter-submit-fallback {
            display: inline-flex !important;
          }

          .filter-noscript {
            display: grid;
            gap: 14px;
            grid-column: 1 / -1;
          }
        </style>
      </noscript>
      <label class="filter-field search-field">
        <span>Search</span>
        <input
          type="search"
          name="q"
          value="{{ search_query }}"
          placeholder="Search trips"
          data-filter-search
          autocomplete="off"
          spellcheck="false"
        >
      </label>

      <div class="filter-field">
        <span>Collections</span>
        <div class="filter-picker-shell" data-group-filter-root></div>
        <div data-group-hidden-inputs>
          {% for trip_group_id in selected_trip_group_ids %}
          <input type="hidden" name="trip_group_id" value="{{ trip_group_id }}">
          {% endfor %}
        </div>
        <noscript>
          <div class="filter-noscript">
            <label class="filter-field">
              <span>Collections</span>
              <select name="trip_group_id" multiple size="{{ 4 if (group_items|length + 1) > 4 else ((group_items|length + 1) if group_items else 2) }}">
                <option value="__ungrouped__" {{ 'selected' if '__ungrouped__' in selected_trip_group_ids else '' }}>No collection</option>
                {% for group in group_items %}
                <option value="{{ group.trip_group_id }}" {{ 'selected' if group.trip_group_id in selected_trip_group_ids else '' }}>{{ group.label }}</option>
                {% endfor %}
              </select>
            </label>
          </div>
        </noscript>
      </div>

      <div class="filter-toggle-field filter-toggle-field--solo">
        <input type="hidden" name="include_booked" value="{{ 'true' if include_booked else 'false' }}" data-filter-booked-input>
        <button
          type="button"
          class="toggle-switch filter-toggle {{ 'is-on' if include_booked else '' }}"
          data-filter-booked-toggle
          aria-pressed="{{ 'true' if include_booked else 'false' }}"
          aria-label="Show booked"
        >
          <span class="toggle-switch-label">Show booked</span>
          <span class="toggle-switch-track" aria-hidden="true">
            <span class="toggle-switch-thumb"></span>
          </span>
        </button>
        <noscript>
          <div class="filter-noscript">
            <label class="filter-field">
              <span>Show booked</span>
              <select name="include_booked">
                <option value="true" {{ 'selected' if include_booked else '' }}>On</option>
                <option value="false" {{ '' if include_booked else 'selected' }}>Off</option>
              </select>
            </label>
          </div>
        </noscript>
      </div>

      <div class="filter-inline-actions filter-toggle-field--solo">
        <button type="submit" class="button secondary filter-submit-fallback">Apply filters</button>
        <a class="button ghost" href="{{ scheduled_filter_clear_path or '/#all-travel' }}" data-clear-filters>Clear filters</a>
      </div>
    </form>
  </section>

  {% include "partials/scheduled_trips_results.html" %}
</div>
