{% from "partials/icon_macros.html" import icon %}
<div class="timeline-title-group">
  {% if row_href %}
  <a class="travel-title" href="{{ row_href }}">{{ row.title }}</a>
  {% else %}
  <span class="travel-title">{{ row.title }}</span>
  {% endif %}
  {% if inline_action_view %}
  <div class="timeline-title-actions" aria-label="Trip actions">
    <a class="timeline-icon-control" href="{{ inline_action_view.edit_href }}" title="Edit trip" aria-label="Edit trip">
      {{ icon("edit") }}
    </a>
    {% if inline_action_view.delete_href %}
    <form
      method="post"
      action="{{ inline_action_view.delete_href }}"
      {% if inline_action_view.delete_confirmation %}
      data-confirm-title="{{ inline_action_view.delete_confirmation.title }}"
      data-confirm-description="{{ inline_action_view.delete_confirmation.description }}"
      data-confirm-action="{{ inline_action_view.delete_confirmation.action }}"
      data-confirm-cancel="{{ inline_action_view.delete_confirmation.cancel }}"
      {% endif %}
    >
      <button class="timeline-icon-control timeline-icon-control--danger" type="submit" title="Delete trip" aria-label="Delete trip">
        {{ icon("delete") }}
      </button>
    </form>
    {% endif %}
  </div>
  {% endif %}
</div>
