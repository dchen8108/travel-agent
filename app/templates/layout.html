<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Milemark</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/app.css') }}?v={{ asset_version }}">
    <script src="{{ url_for('static', path='/app.js') }}?v={{ asset_version }}" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <main class="content">
        <div class="content-inner">
        {% if message %}
        <div class="toast-stack">
          <div class="flash is-{{ message_kind }}" data-toast role="status" aria-live="polite">
            <span>{{ message }}</span>
            <button type="button" class="flash-close" data-toast-close aria-label="Dismiss message">×</button>
          </div>
        </div>
        {% endif %}
        <div class="confirm-modal-root" data-confirm-modal-root hidden>
          <div class="confirm-modal-backdrop" data-confirm-close></div>
          <div
            class="confirm-modal-card"
            role="dialog"
            aria-modal="true"
            aria-labelledby="confirm-modal-title"
            aria-describedby="confirm-modal-description"
          >
            <p class="eyebrow">Confirm action</p>
            <h3 id="confirm-modal-title" data-confirm-modal-title>Are you sure?</h3>
            <p id="confirm-modal-description" class="muted" data-confirm-modal-description>
              This change will take effect immediately.
            </p>
            <div class="confirm-modal-actions">
              <button type="button" class="button secondary" data-confirm-cancel>Keep it</button>
              <button type="button" class="button danger" data-confirm-accept>Continue</button>
            </div>
          </div>
        </div>
        {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </body>
</html>
